name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

# Cancel in-progress runs for the same branch
# Prevents queueing multiple runs when you push several commits quickly
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Build, Test
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history needed for nx affected to compare against base branch
          fetch-depth: 0

      # ── Node setup ──────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Install ─────────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Nx cache ────────────────────────────────────────────────────────────
      # Restores cached build/test results from previous runs
      # If inputs have not changed, tasks are skipped entirely
      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-
            nx-${{ runner.os }}-

      # ── Format check ────────────────────────────────────────────────────────
      - name: Check formatting
        run: npm run format:check

      # ── Lint ────────────────────────────────────────────────────────────────
      # nx affected only lints packages that changed since the base branch
      # On a PR: compares against the target branch (main)
      # On push to main: compares against previous commit
      - name: Lint affected packages
        run: npx nx affected --target=lint --base=origin/main --head=HEAD

      # ── Type check ──────────────────────────────────────────────────────────
      - name: Type check affected packages
        run: npx nx affected --target=typecheck --base=origin/main --head=HEAD

      # ── Build ────────────────────────────────────────────────────────────────
      # Builds in dependency order automatically
      # core is built before adapters that depend on it
      - name: Build affected packages
        run: npx nx affected --target=build --base=origin/main --head=HEAD

      # ── Test ─────────────────────────────────────────────────────────────────
      - name: Test affected packages
        run: npx nx affected --target=test --base=origin/main --head=HEAD --coverage

      # ── Upload coverage ──────────────────────────────────────────────────────
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: packages/core/coverage/lcov.info
          flags: core
          fail_ci_if_error: false

      # ── Bundle size ──────────────────────────────────────────────────────────
      # Fails the build if the core IIFE bundle exceeds 15KB gzipped
      # Only runs if core was affected (built above)
      - name: Check bundle size
        run: |
          if [ -f packages/core/dist/index.iife.js ]; then
            node tools/scripts/size-check.js core 15
          else
            echo "Core was not rebuilt — skipping bundle size check"
          finame: CI

