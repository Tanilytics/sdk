name: Release

on:
  # Triggered manually from the GitHub Actions UI
  # You choose the version bump type when you trigger it
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch # 0.1.0 → 0.1.1  bug fixes
          - minor # 0.1.0 → 0.2.0  new features, backwards compatible
          - major # 0.1.0 → 1.0.0  breaking changes

# Only one release can run at a time
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # needed to push tags and create GitHub Release
  id-token: write # needed for npm provenance

jobs:
  release:
    name: Release to npm
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a token that can push back to the repo
          # The default GITHUB_TOKEN cannot push to protected branches
          token: ${{ secrets.RELEASE_TOKEN }}

      # ── Git config ───────────────────────────────────────────────────────────
      # The release process commits version bumps back to the repo
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Node setup ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Configures npm to publish to the public registry
          # with the auth token from secrets
          registry-url: 'https://registry.npmjs.org'

      # ── Install ──────────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Full CI suite ────────────────────────────────────────────────────────
      # Run everything — no affected shortcuts on a release
      # You must be certain the entire codebase is green before publishing
      - name: Lint all packages
        run: npx nx run-many --target=lint --all

      - name: Type check all packages
        run: npx nx run-many --target=typecheck --all

      - name: Build all packages
        run: npx nx run-many --target=build --all

      - name: Test all packages
        run: npx nx run-many --target=test --all

      - name: Check bundle size
        run: node tools/scripts/size-check.js core 15

      # ── Version bump ─────────────────────────────────────────────────────────
      # Updates version in all publishable package.json files
      # and in src/version.ts so the SDK knows its own version
      - name: Bump version
        id: version
        run: |
          # Get current version from core package.json
          CURRENT=$(node -p "require('./packages/core/package.json').version")
          echo "Current version: $CURRENT"

          # Calculate new version using npm semver
          NEW=$(npx semver $CURRENT -i ${{ github.event.inputs.bump }})
          echo "New version: $NEW"

          # Store for later steps
          echo "new_version=$NEW" >> $GITHUB_OUTPUT

          # Update package.json for all publishable packages
          for pkg in \
            packages/core \
            packages/media-adapters/videojs \
            packages/media-adapters/hlsjs \
            packages/media-adapters/youtube; do
            if [ -f "$pkg/package.json" ]; then
              npm version $NEW --no-git-tag-version --prefix $pkg
              echo "Updated $pkg to $NEW"
            fi
          done

          # Update version.ts so the SDK reports its own version correctly
          echo "// Updated automatically by the release pipeline — do not edit manually" > packages/core/src/version.ts
          echo "export const SDK_VERSION = '$NEW';" >> packages/core/src/version.ts

      # ── Rebuild with new version ──────────────────────────────────────────────
      # The version number is baked into the bundle at build time
      - name: Rebuild with updated version
        run: npx nx run-many --target=build --all

      # ── Publish to npm ────────────────────────────────────────────────────────
      - name: Publish @analytics-sdk/core
        working-directory: packages/core
        run: npm publish --access public 
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # - name: Publish @analytics-sdk/adapter-videojs
        #   working-directory: packages/media-adapters/videojs
        #   run: npm publish --access public 
        #   env:
        #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

        # - name: Publish @analytics-sdk/adapter-hlsjs
        #   working-directory: packages/media-adapters/hlsjs
        #   run: npm publish --access public 
        #   env:
        #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

        # - name: Publish @analytics-sdk/adapter-youtube
        #   working-directory: packages/media-adapters/youtube
        #   run: npm publish --access public 
        #   env:
        #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Commit version bumps ──────────────────────────────────────────────────
      - name: Commit and tag
        run: |
          git add .
          git commit -m "chore: release v${{ steps.version.outputs.new_version }}"
          git tag "v${{ steps.version.outputs.new_version }}"
          git push origin main --follow-tags

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.new_version }}
          name: v${{ steps.version.outputs.new_version }}
          generateReleaseNotes: true
          artifacts: |
            packages/core/dist/index.iife.js
